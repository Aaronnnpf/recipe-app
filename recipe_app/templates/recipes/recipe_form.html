{% extends 'recipes/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<link rel="stylesheet" href="assets/styles.css">
<h1>{{ title }}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% if title == 'Create Recipe' %}Create Recipe{% else %}Save Changes{% endif %}</button>
</form>
{% endblock %}
