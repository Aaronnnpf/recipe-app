{% extends 'recipes/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>
<form method="post">
    {% csrf_token %}
    
    <div style="margin-bottom: 1.5rem;">
        <h3 style="margin-bottom: 0.5rem;">Title</h3>
        {{ form.title }}
    </div>
    
    <div style="margin-bottom: 1.5rem;">
        <h3 style="margin-bottom: 0.5rem;">Description</h3>
        {{ form.description }}
    </div>
    
    <div style="margin-bottom: 1.5rem;">
        <h3 style="margin-bottom: 0.5rem;">Ingredients</h3>
        {{ form.ingredients }}
    </div>
    
    <div style="margin-bottom: 1.5rem;">
        <h3 style="margin-bottom: 0.5rem;">Instructions</h3>
        {{ form.instructions }}
    </div>
    
    <button type="submit" class="btn" style="display: block; margin: 1rem auto;">{% if title == 'Create Recipe' %}Create Recipe{% else %}Save Changes{% endif %}</button>
</form>
{% endblock %}
